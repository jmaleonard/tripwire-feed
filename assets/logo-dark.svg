<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 140" role="img" aria-label="tripwire">
  <title>tripwire</title>
  <!-- shield -->
  <path d="M26 24 Q26 20 30 20 L98 20 Q102 20 102 24 L102 64 C102 94 86 116 64 128 C42 116 26 94 26 64 Z"
        fill="#e6edf3" fill-opacity="0.06" stroke="#e6edf3" stroke-width="5" stroke-linejoin="round"/>
  <!-- taut wire across the shield -->
  <line x1="14" y1="72" x2="114" y2="72" stroke="#e6edf3" stroke-width="5" stroke-linecap="round"/>
  <circle cx="14" cy="72" r="5" fill="#e6edf3"/>
  <circle cx="114" cy="72" r="5" fill="#e6edf3"/>
  <!-- the trip: alert spark where the wire is crossed -->
  <g stroke="#e5484d" stroke-width="4" stroke-linecap="round">
    <line x1="64" y1="70" x2="64" y2="50"/>
    <line x1="55" y1="62" x2="49" y2="51"/>
    <line x1="73" y1="62" x2="79" y2="51"/>
  </g>
  <circle cx="64" cy="72" r="6.5" fill="#e5484d"/>
  <!-- wordmark -->
  <text x="142" y="90" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="52" font-weight="700" letter-spacing="-1">
    <tspan fill="#e5484d">trip</tspan><tspan fill="#e6edf3">wire</tspan>
  </text>
</svg>

name: Seed IoC feed

# Daily IoC feed publisher + public top-offenders page. Self-contained: runs
# bundled scripts (no install) and publishes to THIS repo using the built-in
# GITHUB_TOKEN — no PAT needed.
#
#   - full snapshot      -> release asset on the `feed` tag
#   - delta + manifest   -> committed under feed/v1/
#   - top-offenders page -> GitHub Pages (site/)
#
# Source of truth for scripts/*.mjs lives in jmaleonard/agent-tripwire
# (packages/feeds + scripts/{publish-feed,build-site}.mjs); regenerate the
# bundles with:
#   npx esbuild scripts/publish-feed.mjs --bundle --platform=node --format=esm \
#     --outfile=<this-repo>/scripts/publish-feed.mjs
#   npx esbuild scripts/build-site.mjs   --bundle --platform=node --format=esm \
#     --outfile=<this-repo>/scripts/build-site.mjs

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily
  workflow_dispatch:
    inputs:
      date:
        description: 'Override publish date (YYYY-MM-DD)'
        required: false
  # Re-publish the moment a maintainer approves a community report.
  issues:
    types: [labeled]

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write # comment + relabel + close ingested reports

jobs:
  seed:
    runs-on: ubuntu-22.04
    # Scheduled/manual runs always go; an issue event only triggers a publish
    # when the label just added is `approved`.
    if: github.event_name != 'issues' || github.event.label.name == 'approved'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Snapshot the approved-but-not-yet-ingested reports at job start, so the
      # close-out step relabels exactly what this run set out to ingest.
      - name: Collect approved reports
        id: approved
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          nums=$(gh issue list --repo "$GITHUB_REPOSITORY" \
            --label ioc-report --label approved --state open \
            --json number,labels \
            -q '[.[] | select(any(.labels[].name; . == "ingested") | not) | .number] | join(" ")')
          echo "issues=$nums" >> "$GITHUB_OUTPUT"
          echo "approved reports queued: ${nums:-none}"

      - name: Build snapshot + delta + manifest
        env:
          FEED_REPO: ${{ github.repository }}
          FEED_DIR: ${{ github.workspace }}
          FEED_TAG: feed
          OUT_DIR: ${{ github.workspace }}/feed-out
          PUBLISH_DATE: ${{ github.event.inputs.date }}
          # Lifts the GitHub Advisory Database source from 60/hr to 5000/hr;
          # the malware corpus needs it. Public data — read-only use of the token.
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/publish-feed.mjs

      # Hand the freshly-built snapshot to the pages job directly, so it never
      # has to re-download via the release CDN (whose cache lags the clobbered
      # asset and intermittently fails build-site's integrity check).
      - name: Upload snapshot for pages job
        uses: actions/upload-artifact@v4
        with:
          name: feed-snapshot
          path: ${{ github.workspace }}/feed-out/latest.json
          retention-days: 1

      - name: Publish full snapshot (release assets)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view feed >/dev/null 2>&1 \
            || gh release create feed --title "IoC feed" \
                 --notes "Full IoC snapshots (snapshot-<date>.json). See feed/v1/manifest.json."
          # Upload the date-stamped snapshot (manifest points here) + the
          # latest.json human mirror. The dated name is never reused, so its CDN
          # URL is always fresh.
          gh release upload feed "$GITHUB_WORKSPACE"/feed-out/*.json --clobber
          # Prune: keep the 3 newest dated snapshots, delete the rest.
          gh release view feed --json assets -q '.assets[].name' \
            | grep '^snapshot-' | sort -r | tail -n +4 \
            | while read -r asset; do
                echo "pruning $asset"
                gh release delete-asset feed "$asset" --yes
              done

      - name: Commit delta + manifest
        env:
          PUBLISH_DATE: ${{ github.event.inputs.date }}
        run: |
          set -euo pipefail
          git config user.name  "tripwire-feed-bot"
          git config user.email "noreply@github.com"
          git add -A feed/v1
          if git diff --cached --quiet; then
            echo "No manifest/delta changes to commit."
          else
            git commit -m "feed: publish ${PUBLISH_DATE:-$(date -u +%F)}"
            git push
          fi

      # Close the loop on community reports that just went into the feed: comment,
      # relabel approved -> ingested (so they're not re-ingested), and close.
      # Only the issues snapshotted at job start, and only after a successful
      # publish above.
      - name: Close out ingested reports
        if: ${{ steps.approved.outputs.issues != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLISH_DATE: ${{ github.event.inputs.date }}
          ISSUES: ${{ steps.approved.outputs.issues }}
        run: |
          set -euo pipefail
          date="${PUBLISH_DATE:-$(date -u +%F)}"
          for n in $ISSUES; do
            echo "closing out report #$n"
            gh issue comment "$n" --repo "$GITHUB_REPOSITORY" \
              --body "✅ Added to the feed (snapshot $date) as a \`community-report\` source. Thanks for the report!"
            gh issue edit "$n" --repo "$GITHUB_REPOSITORY" --add-label ingested --remove-label approved
            gh issue close "$n" --repo "$GITHUB_REPOSITORY"
          done

  # Build the public "top offenders" page from the just-published feed and
  # deploy it to GitHub Pages. build-site.mjs is a self-contained bundle of
  # jmaleonard/agent-tripwire's scripts/build-site.mjs.
  pages:
    needs: seed
    runs-on: ubuntu-22.04
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Download snapshot from seed job
        uses: actions/download-artifact@v4
        with:
          name: feed-snapshot
          path: ${{ github.workspace }}/feed-in
      - name: Build the top-offenders page
        env:
          SITE_DIR: ${{ github.workspace }}/site
          SNAPSHOT_FILE: ${{ github.workspace }}/feed-in/latest.json
        run: node scripts/build-site.mjs
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
